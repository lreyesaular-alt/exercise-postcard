<!DOCTYPE html>
<html lang="es">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Postcard</title>
		<link rel="stylesheet" href="styles.css" />
	</head>
	<body>
		<div class="postcard">
			<div class="postcard-header">
				<h1>Luis Reyes</h1>
				<img
					src="https://raw.githubusercontent.com/breatheco-de/exercise-postcard/e63a7916530cc850bd92aa1c2e19191837fb5c80/.learn/assets/4geeks.png"
					alt="logo 4Geeks"
				/>
			</div>
			<div class="postcard-body">
				<div class="body-left">
					<p>Hola,Soy Luis Reyes.</p>
					<p>Este es mi primer proyecto digital</p>
				</div>
				<div class="body-right">
					<input type="text" placeholder="Empresa">
					<input type="email" placeholder="Luis@aprendiendo.com">
					<input type="text" placeholder="telefono">
				</div>
			</div>
			<div class="postcard-footer">
				<button>Send My postcard</button>
			</div>
		</div>
	</body>
</html>
